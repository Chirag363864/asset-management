services:
  - type: web
    name: finance-advisor-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MONGODB_URI
        value: "mongodb+srv://username:password@cluster.mongodb.net/finance_db"
      - key: SECRET_KEY
        generateValue: true
      - key: ALPHA_VANTAGE_API_KEY
        value: "your-alpha-vantage-api-key"
      - key: ENVIRONMENT
        value: "production"